name: Verify
on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - run: make verify

  podman-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Verify inside container
        run: make verify-in-container
      - name: Full integration test in container
        run: make full-container-validate

  integration-test:
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build & test all shells
        run: bash integration-test.sh
      - name: Flake check
        run: nix flake check
